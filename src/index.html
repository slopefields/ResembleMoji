<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResembleMoji</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <!-- Header -->
    <h1 id="app-title">ResembleMoji</h1>

    <!-- Main Container for UI -->
    <div id="main-container">
        <!-- Main Content Box -->
        <div id="main-box">
            <video id="webcam" autoplay playsinline></video>
            <img id="image-display">
        </div>

        <!-- Start Game button -->
        <div id="game-controls">
            <button id="start-button" class="btn">Start Game</button>
        </div>
    </div>

    <!-- Predictions -->
    <div id="object-predictions" class="prediction-box"></div>
    <div id="expression-predictions" class="prediction-box"></div>

    <!-- Countdown and Timer -->
    <div id="countdown-timer">
        <h2>Countdown: <span id="countdown"></span></h2>
        <h3>Timer: <span id="timer"></span></h3>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@0.15.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="./js/script.js" type="module"></script>
</body>

</html>

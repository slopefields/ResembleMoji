<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResembleMoji</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <!-- Header -->
    <h1 id="app-title">ResembleMoji</h1>
    <div id="main-container">

        <!-- Main Content Box -->
        <div id="main-box">
            <video id="webcam" autoplay playsinline class="hidden"></video>
            <img id="image-display" class="hidden">
        </div>

        <!-- Start Game button -->
        <button id="start-button">Start Game</button>

    </div>

    <!-- Predictions -->
    <div id="object-predictions"></div>
    <div id="expression-predictions"></div>

    <!-- Countdown and Timer -->
    <div>
        <h2>Countdown: <span id="countdown"></span></h2>
        <h3>Timer: <span id="timer"></span></h3>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@0.15.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>

    <script src="./js/script.js" type="module"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResembleMoji</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>

    <!-- Main screen -->
    <div id="main-container" class="screen active">
        <!-- Title/header -->
        <h1 id="header">ResembleMoji</h1>

        <!-- Start Game button -->
        <div id="game-controls">
            <button id="start-button" class="btn">Start Game</button>
        </div>
    </div>
    <!-- Main screen end -->



    <!-- Game screen -->
    <div id="game-container" class="screen">

        <!-- Predictions -->
        <div id="object-predictions" class="prediction-box"></div>
        <div id="expression-predictions" class="prediction-box"></div>

        <!-- Countdown and Timer -->
        <div id="countdown-timer">
            <h2>Countdown: <span id="countdown"></span></h2>
            <h3>Timer: <span id="timer"></span></h3>
        </div>

        <!-- Camera display -->
        <video id="webcam" autoplay playsinline></video>
        <img id="image-display">

    </div>
    <!-- Game screen end -->

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@0.15.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="./js/script.js" type="module"></script>
</body>

</html>

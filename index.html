<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResembleMoji</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header -->
    <h1 id="app-title">ResembleMoji</h1>
    <div id="main-container">

        <!-- Main Content Box -->
        <div id="main-box">
            <video id="webcam" autoplay playsinline class="hidden"></video>
            <img id="image-display" class="hidden">
        </div>

        <!-- Floating action button for image upload and camera -->
        <div id="fab-container">
            <button id="fab">+</button>
            <div id="fab-options">
                <label for="image-upload" class="fab-button">🖼️</label>
                <input type="file" id="image-upload" accept="image/*" hidden>
                <button id="enable-webcam" class="fab-button">📷</button>
            </div>
        </div>

        <!-- Predict Button -->
        <button id="predict-button">Predict</button>

        <!-- Webcam image capture button -->
        <button id="capture-button">Capture from webcam</button>

    </div>

    <!-- Predictions -->
    <div id="mobilenet-predictions"></div>
    <ul id="blendshapes" class="small-font"></ul>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/dist/face-api.js"></script>
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResembleMoji</title>
</head>

<body>
    <h1>ResembleMoji</h1>

    <!--Image upload-->
    <label for="upload">Choose a photo to upload</label><br>
    <input type="file" id="imageUpload" name="upload" accept="image/*">

    <!--Uploaded image display-->
    <img id="imageDisplay"></img>

    <!--Submit and predict button-->
    <button id="predictButton">Predict</button>

    <!--Section for prediction rankings-->
    <div id="predictions"></div>

    <!--Scripts-->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <script src="script.js"></script>
</body>

</html>

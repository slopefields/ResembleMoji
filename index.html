<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResembleMoji</title>
</head>

<body>
    <h1>ResembleMoji</h1>

    <!--Image upload-->
    <label for="upload">Choose a photo to upload</label><br>
    <input type="file" id="image-upload" name="upload" accept="image/*">

    <!--Uploaded image display-->
    <img id="image-display"></img>

    <!--Submit and predict button-->
    <button id="predict-button">Predict</button>

    <!--Section for MobileNet prediction rankings-->
    <div id="mobilenet-predictions"></div>

    <!-- Unordered List for Landmarker blendshapes-->
    <ul id="blendshapes"></ul>

    <!--Scripts-->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
